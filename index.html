<style>
:root{
--bg1:#07080f;--bg2:#0e1018;--bg3:#151823;
--surf:rgba(255,255,255,.03);--surf2:rgba(255,255,255,.06);--surf3:rgba(255,255,255,.09);
--brd:rgba(255,255,255,.07);--brd-a:rgba(99,213,190,.4);
--text:#e2e8f0;--dim:#5a6075;--muted:#3a3f52;
--acc:#63d5be;--acc2:#8b5cf6;--acc3:#f59e0b;
--pink:#f472b6;--red:#ef4444;--green:#34d399;
--grad:linear-gradient(135deg,#63d5be,#8b5cf6);
--grad2:linear-gradient(135deg,#8b5cf6,#f472b6);
--grad-tg:linear-gradient(135deg,#63d5be,#0088cc);
--grain-opacity:.035;
--glow-opacity:.12;
--card-shadow:none;
--cta-text:#07080f;
}

/* ===== LIGHT THEME ===== */
html.light{
--bg1:#f5f3f0;--bg2:#ece9e4;--bg3:#ffffff;
--surf:rgba(0,0,0,.03);--surf2:rgba(0,0,0,.05);--surf3:rgba(0,0,0,.08);
--brd:rgba(0,0,0,.08);--brd-a:rgba(16,130,110,.35);
--text:#1a1a2e;--dim:#6b7280;--muted:#9ca3af;
--acc:#0d9488;--acc2:#7c3aed;--acc3:#d97706;
--pink:#db2777;--red:#dc2626;--green:#059669;
--grad:linear-gradient(135deg,#0d9488,#7c3aed);
--grad2:linear-gradient(135deg,#7c3aed,#db2777);
--grad-tg:linear-gradient(135deg,#0d9488,#0088cc);
--grain-opacity:.02;
--glow-opacity:.06;
--card-shadow:0 2px 12px rgba(0,0,0,.06);
--cta-text:#ffffff;
}
html.light .glow-1{background:#0d9488}
html.light .glow-2{background:#7c3aed}
html.light .glow-3{background:#db2777}
html.light .logo{color:var(--acc)}
html.light .lbtn{background:var(--surf2);color:var(--acc);border-color:var(--brd)}
html.light .cta{color:var(--cta-text)}
html.light .nn{color:#fff}
html.light .dbtn.sel{color:#fff}
html.light .bk-val{color:var(--acc)}
html.light .sv-num{color:var(--green)}
html.light .st-pr{color:var(--acc)}
html.light .sal-in{color:var(--text);background:var(--bg3)}
html.light .rv-ok{background:rgba(5,150,105,.06);border-color:rgba(5,150,105,.2)}
html.light .rv-mid{background:rgba(217,119,6,.06);border-color:rgba(217,119,6,.2)}
html.light .rv-no{background:rgba(220,38,38,.04);border-color:rgba(220,38,38,.1)}
html.light .badge-free{background:rgba(5,150,105,.1);color:#059669}
html.light .badge-visa{background:rgba(217,119,6,.1);color:#d97706}
html.light .badge-hot{background:rgba(219,39,119,.1);color:#db2777}
html.light .res-hero{background:var(--bg3);box-shadow:var(--card-shadow)}
html.light .bk{background:var(--bg3);box-shadow:var(--card-shadow)}
html.light .sv{background:var(--bg3);box-shadow:var(--card-shadow)}
html.light .tip{background:var(--bg3);box-shadow:var(--card-shadow)}
html.light .mode{background:var(--bg3);box-shadow:var(--card-shadow)}
html.light .rv{background:var(--bg3);box-shadow:0 1px 6px rgba(0,0,0,.04)}
html.light .confetti-piece{mix-blend-mode:multiply}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg1);color:var(--text);min-height:100vh;-webkit-overflow-scrolling:touch;position:relative;transition:background .4s,color .4s}

/* GRAIN */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:var(--grain-opacity);
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* AMBIENT GLOW */
.glow{position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(80px);opacity:var(--glow-opacity);transition:opacity .5s}
.glow-1{width:300px;height:300px;background:#63d5be;top:-80px;left:-60px;animation:gf 12s ease-in-out infinite}
.glow-2{width:250px;height:250px;background:#8b5cf6;bottom:-50px;right:-50px;animation:gf 15s ease-in-out infinite reverse}
.glow-3{width:200px;height:200px;background:#f472b6;top:40%;left:50%;animation:gf 10s ease-in-out infinite 3s}
@keyframes gf{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.1)}66%{transform:translate(-20px,30px) scale(.9)}}

@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes count{from{opacity:0;transform:scale(.5) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes bg{from{width:0}}
@keyframes shine{0%{left:-100%}100%{left:100%}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(400px) rotate(720deg);opacity:0}}

.sl{animation:su .5s ease forwards}
.sl1{animation-delay:.05s;opacity:0}.sl2{animation-delay:.1s;opacity:0}.sl3{animation-delay:.15s;opacity:0}
.sl4{animation-delay:.2s;opacity:0}.sl5{animation-delay:.25s;opacity:0}.sl6{animation-delay:.3s;opacity:0}
.sl7{animation-delay:.35s;opacity:0}.sl8{animation-delay:.4s;opacity:0}.sl9{animation-delay:.45s;opacity:0}.sl10{animation-delay:.5s;opacity:0}

.wrap{max-width:440px;margin:0 auto;padding:12px 16px 100px;position:relative;z-index:1}

/* HEADER */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-top:8px}
.logo{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--acc);letter-spacing:-1px}
.logo-sub{font-size:11px;color:var(--dim);margin-top:1px;font-weight:500}
.lbtn{background:var(--surf2);border:1px solid var(--brd);border-radius:20px;padding:5px 12px;color:var(--acc);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;backdrop-filter:blur(12px)}

/* PROGRESS */
.prog{display:flex;gap:4px;margin-bottom:16px}.prog-d{flex:1;height:2.5px;border-radius:2px;background:var(--surf2);transition:.3s}.prog-d.on{background:var(--grad)}

.ttl{font-size:19px;font-weight:800;margin-bottom:3px;letter-spacing:-.3px}
.hint{font-size:11px;color:var(--dim);margin-bottom:16px}

/* COUNTRY CARDS — rich design */
.c-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.c-card{background:var(--surf);border:1px solid var(--brd);border-radius:16px;padding:14px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;box-shadow:var(--card-shadow)}
.c-card:active{transform:scale(.96)}
.c-card.sel{border-color:var(--brd-a);background:rgba(99,213,190,.08)}
.c-card::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:0 16px 0 40px;opacity:.06;transition:.3s}
.c-card:nth-child(1)::before{background:#ef4444}.c-card:nth-child(2)::before{background:#f59e0b}
.c-card:nth-child(3)::before{background:#22c55e}.c-card:nth-child(4)::before{background:#3b82f6}
.c-card:nth-child(5)::before{background:#a855f7}.c-card:nth-child(6)::before{background:#ec4899}
.c-card:nth-child(7)::before{background:#14b8a6}.c-card:nth-child(8)::before{background:#06b6d4}
.c-card:nth-child(9)::before{background:#f97316}.c-card:nth-child(10)::before{background:#eab308}
.c-flag{font-size:32px;margin-bottom:6px;display:block}
.c-name{font-weight:700;font-size:14px;letter-spacing:-.2px}
.c-scene{font-size:11px;margin-top:2px;opacity:.6}
.c-meta{font-size:10px;color:var(--dim);margin-top:6px;display:flex;gap:6px;align-items:center}
.c-meta .badge{padding:2px 6px;border-radius:6px;font-size:9px;font-weight:700}
.badge-free{background:rgba(52,211,153,.12);color:var(--green)}
.badge-visa{background:rgba(245,158,11,.12);color:var(--acc3)}
.badge-hot{background:rgba(244,114,182,.12);color:var(--pink)}
.c-price{font-size:10px;color:var(--dim);margin-top:6px}

/* STYLE CARDS */
.st-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.st-card{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surf);border:1px solid var(--brd);border-radius:14px;cursor:pointer;transition:.2s;font-family:inherit;color:var(--text);width:100%;text-align:left}
.st-card:active{transform:scale(.97)}
.st-card.sel{border-color:var(--brd-a);background:rgba(99,213,190,.06)}
.st-emo{font-size:28px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:var(--surf2);border-radius:12px;flex-shrink:0}
.st-lbl{font-weight:700;font-size:14px}.st-desc{font-size:11px;color:var(--dim);margin-top:1px}
.st-pr{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--acc)}
.st-pr small{font-size:9px;color:var(--dim)}

/* OPTION PILLS */
.opts{display:flex;gap:6px;margin-bottom:24px}
.opt{flex:1;text-align:center;padding:12px 4px;background:var(--surf);border:1px solid var(--brd);border-radius:14px;cursor:pointer;color:var(--text);font-family:inherit;transition:.15s}
.opt.sel{border-color:var(--brd-a);background:rgba(99,213,190,.06)}
.opt:active{transform:scale(.95)}
.opt-emo{font-size:22px}.opt-lbl{font-size:10px;font-weight:600;margin-top:3px;letter-spacing:.3px;text-transform:uppercase}
.opt-pr{font-size:9px;color:var(--dim);margin-top:2px}

/* DURATION */
.dur{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.dbtn{background:var(--surf2);border:1px solid var(--brd);border-radius:12px;padding:10px 18px;color:var(--text);font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;transition:.2s}
.dbtn.sel{background:var(--acc);color:var(--bg1);border-color:var(--acc)}
.dbtn:active{transform:scale(.94)}

/* NAV */
.nav{display:flex;gap:8px;margin-top:20px}
.nb{flex:1;background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:13px;color:var(--acc);font-weight:600;font-size:14px;cursor:pointer;font-family:inherit}
.nn{flex:2;background:var(--grad);border:none;border-radius:14px;padding:13px;color:var(--bg1);font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
.nb:active,.nn:active{transform:scale(.96)}

/* RESULT HERO */
.res-hero{background:var(--bg3);border:1px solid var(--brd);border-radius:24px;padding:28px 20px 20px;margin-bottom:16px;text-align:center;position:relative;overflow:hidden}
.res-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad)}
.res-hero::after{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(99,213,190,.1),transparent);pointer-events:none}
.res-ctry{font-size:13px;color:var(--dim);margin-bottom:8px}
.res-total{font-family:'Space Mono',monospace;font-size:48px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:count .6s ease forwards}
.res-uzs{font-size:12px;color:var(--dim);margin-top:4px}
.res-tag{margin-top:16px;padding:10px 14px;background:var(--surf);border-radius:12px;display:inline-flex;align-items:center;gap:8px}
.res-wd{margin-top:10px;padding:10px 14px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.12);border-radius:12px;font-size:13px}
.res-wd b{font-family:'Space Mono',monospace;font-size:18px;color:var(--acc3)}

/* BREAKDOWN */
.bk{background:var(--bg3);border:1px solid var(--brd);border-radius:18px;padding:16px;margin-bottom:16px}
.bk-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.bk-row:last-child{border-bottom:none}
.bk-bar{width:80px;height:5px;border-radius:3px;background:var(--surf2);overflow:hidden}
.bk-fill{height:100%;border-radius:3px;background:var(--grad);animation:bg .8s ease forwards}
.bk-val{font-family:'Space Mono',monospace;font-weight:700;font-size:13px;min-width:55px;text-align:right;color:var(--acc)}

/* SAVING */
.sv{background:var(--bg3);border:1px solid rgba(52,211,153,.1);border-radius:18px;padding:16px;margin-bottom:16px}
.sv-grid{display:flex;gap:8px;margin-top:10px}
.sv-item{flex:1;text-align:center;padding:10px 4px;background:var(--surf);border-radius:12px}
.sv-num{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--green)}
.sv-lbl{font-size:9px;color:var(--dim);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* TIP */
.tip{background:var(--bg3);border:1px solid rgba(245,158,11,.1);border-radius:18px;padding:14px;margin-bottom:16px}

/* CTA */
.cta{display:block;width:100%;background:var(--grad-tg);border:none;border-radius:16px;padding:15px;color:var(--bg1);font-weight:700;font-size:15px;text-align:center;cursor:pointer;text-decoration:none;margin-bottom:4px;position:relative;overflow:hidden}
.cta::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);animation:shine 3s infinite}
.cta-inner{display:flex;align-items:center;justify-content:center;gap:8px;position:relative;z-index:1}
.cta-sub{text-align:center;font-size:11px;color:var(--dim);margin-bottom:16px}
.brow{display:flex;gap:8px}
.bbtn{flex:1;background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:12px;color:var(--acc);font-weight:600;font-size:13px;cursor:pointer;font-family:inherit}
.bbtn:active{transform:scale(.95)}

/* MODE CARDS */
.modes{display:flex;flex-direction:column;gap:12px;margin-top:20px}
.mode{background:var(--bg3);border:1px solid var(--brd);border-radius:20px;padding:20px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden}
.mode:active{transform:scale(.97)}
.mode::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.mode:nth-child(1)::before{background:var(--grad)}
.mode:nth-child(2)::before{background:linear-gradient(90deg,var(--acc3),var(--pink))}
.mode:nth-child(3)::before{background:linear-gradient(90deg,var(--green),var(--acc))}
.mode-ico{font-size:36px;width:56px;height:56px;display:flex;align-items:center;justify-content:center;background:var(--surf2);border-radius:16px;flex-shrink:0}
.mode-t{font-size:16px;font-weight:700;letter-spacing:-.2px}
.mode-d{font-size:11px;color:var(--dim);margin-top:3px;line-height:1.4}

/* REVERSE/WORK */
.sal-row{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.sal-in{flex:1;background:var(--bg3);border:1px solid var(--brd);border-radius:14px;padding:13px 16px;color:#fff;font-size:16px;font-family:'Space Mono',monospace;font-weight:700;outline:none;letter-spacing:-.5px}
.sal-in:focus{border-color:var(--acc)}
.sal-lbl{font-size:12px;color:var(--dim);white-space:nowrap;font-weight:500}

.rv-grid{display:flex;flex-direction:column;gap:6px}
.rv{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg3);border:1px solid var(--brd);border-radius:14px;transition:.2s}
.rv-ok{border-color:rgba(52,211,153,.2);background:rgba(52,211,153,.04)}
.rv-mid{border-color:rgba(245,158,11,.2);background:rgba(245,158,11,.04)}
.rv-no{border-color:rgba(239,68,68,.1);opacity:.4}
.rv-flag{font-size:22px}.rv-name{flex:1;font-size:13px;font-weight:600}
.rv-info{text-align:right}.rv-num{font-family:'Space Mono',monospace;font-weight:700;font-size:15px}
.rv-det{font-size:9px;color:var(--dim);margin-top:1px}

/* CONFETTI */
.confetti-container{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:100;overflow:hidden;height:100vh}
.confetti-piece{position:absolute;width:8px;height:8px;top:-10px;animation:confetti 2.5s ease-in forwards}

.step{display:none}.step.on{display:block}

/* VISA CHECKER */
.vc-search{position:relative;margin-bottom:12px}
.vc-search input{width:100%;padding:11px 14px 11px 36px;border-radius:12px;border:1px solid var(--brd);background:var(--surf);color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:.2s;backdrop-filter:blur(8px)}
.vc-search input:focus{border-color:var(--acc)}
.vc-search input::placeholder{color:var(--muted)}
.vc-search .vc-si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.vc-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--surf2);border:none;color:var(--dim);width:22px;height:22px;border-radius:50%;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center}
.vc-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.vc-pills::-webkit-scrollbar{display:none}
.vc-stats{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.vc-stats::-webkit-scrollbar{display:none}
.vc-stat{flex-shrink:0;padding:5px 10px;border-radius:8px;font-size:10px;font-weight:700;display:flex;align-items:center;gap:4px}
.vc-reg{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin:12px 0 6px;padding-left:2px}
.vc-item{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--surf);border:1px solid var(--brd);border-radius:14px;margin-bottom:5px;cursor:pointer;transition:.15s}
.vc-item:active{transform:scale(.98);background:var(--surf2)}
.vc-badge{flex-shrink:0;padding:3px 8px;border-radius:7px;font-size:10px;font-weight:700}
.vcb-0{background:rgba(52,211,153,.12);color:var(--green)}
.vcb-1{background:rgba(245,158,11,.12);color:var(--acc3)}
.vcb-2{background:rgba(139,92,246,.12);color:var(--acc2)}
.vcb-3{background:rgba(239,68,68,.1);color:var(--red)}
.vc-det{margin-top:10px;padding:12px;background:var(--bg3);border:1px solid var(--brd);border-radius:14px;font-size:12px;color:var(--dim);line-height:1.6;animation:su .3s ease}
</style>
</head>
<body>
<div class="glow glow-1"></div><div class="glow glow-2"></div><div class="glow glow-3"></div>
<div class="wrap">
<div class="hdr">
<div><div class="logo" id="hT">✈ NOMADS</div><div class="logo-sub" id="hS"></div></div>
<div style="display:flex;gap:6px">
<button class="lbtn" id="tb" onclick="tT()" aria-label="Theme">🌙</button>
<button class="lbtn" id="lb" onclick="tL()">RU</button>
</div>
</div>
<div class="prog" id="prog" style="display:none"><div class="prog-d" id="p1"></div><div class="prog-d" id="p2"></div><div class="prog-d" id="p3"></div><div class="prog-d" id="p4"></div></div>
<div class="step on" id="s0"></div><div class="step" id="s1"></div><div class="step" id="s2"></div>
<div class="step" id="s3"></div><div class="step" id="s4"></div><div class="step" id="s5"></div><div class="step" id="s6"></div><div class="step" id="s7"></div><div class="step" id="s8"></div><div class="step" id="s9"></div>
<div class="confetti-container" id="confetti"></div>
</div>

<script>
// ===== CONFIG =====
// IMPORTANT: Replace with your Railway URL after deploy
const API_URL = "https://web-production-3b2b4.up.railway.app";

// ===== THEME: auto day/night + manual toggle =====
let isDark = true;
function initTheme() {
    const h = new Date().getHours();
    // Uzbekistan UTC+5: если юзер в другом часовом поясе — берём локальное время
    const isNight = h < 6 || h >= 20;
    isDark = isNight;
    // Check TG theme
    try {
        const tgTheme = window.Telegram?.WebApp?.colorScheme;

function renderCalWithPrices(y,m,dayPrices){
    const g=$('calG'),now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    const f=new Date(y,m,1),last=new Date(y,m+1,0),sd=(f.getDay()+6)%7;
    const dn=L==='uz'?['Du','Se','Ch','Pa','Ju','Sh','Ya']:['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
    
    // Find min/max prices for color coding
    const allPrices=Object.values(dayPrices).map(v=>v.price).filter(p=>p>0);
    const minP=allPrices.length?Math.min(...allPrices):0;
    const maxP=allPrices.length?Math.max(...allPrices):0;
    
    let h=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">`;
    dn.forEach(d=>{h+=`<div style="font-size:10px;color:var(--dim);padding:4px 0;font-weight:600">${d}</div>`});
    for(let i=0;i<sd;i++) h+=`<div></div>`;
    for(let d=1;d<=last.getDate();d++){
        const dt=new Date(y,m,d),ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const past=dt<today;
        const dp=dayPrices[ds];
        const price=dp?dp.price:0;
        const link=dp?dp.link:'';
        
        // Color: green=cheap, yellow=mid, dim=expensive, no price=muted
        let priceColor='var(--muted)';
        if(price>0&&minP>0){
            const ratio=(price-minP)/(maxP-minP||1);
            if(ratio<=0.2) priceColor='var(--green)';
            else if(ratio<=0.5) priceColor='var(--acc)';
            else if(ratio<=0.75) priceColor='var(--acc3)';
            else priceColor='var(--dim)';
        }
        
        if(past){
            h+=`<div style="padding:6px 0;opacity:.25"><div style="font-size:12px;color:var(--muted)">${d}</div></div>`;
        } else {
            const clickAction=link?
                `window.open('${link}','_blank')`:
                `flyDateStr='${ds}';flyMonth='';hp('light');doSearch()`;
            h+=`<div onclick="${clickAction}" style="padding:6px 2px;cursor:pointer;border-radius:10px;transition:.15s;border:1px solid ${price===minP&&price>0?'var(--green)':'transparent'};background:${price===minP&&price>0?'rgba(52,211,153,.08)':'transparent'}" ontouchstart="this.style.background='var(--surf2)'" ontouchend="this.style.background='${price===minP&&price>0?'rgba(52,211,153,.08)':'transparent'}'">
                <div style="font-size:13px;font-weight:600;color:var(--text)">${d}</div>
                ${price>0?`<div style="font-size:9px;font-weight:700;color:${priceColor};margin-top:1px">$${price}</div>`:`<div style="font-size:9px;color:var(--muted);margin-top:1px">—</div>`}
            </div>`;
        }
    }
    h+=`</div>`;
    if(minP>0){
        h+=`<div style="margin-top:8px;text-align:center;font-size:11px;color:var(--green);font-weight:600">💚 ${L==='uz'?'Eng arzon':'Мин.'}: $${minP} ${maxP!==minP?(L==='uz'?' — eng qimmat':' — макс.')+': $'+maxP:''}</div>`;
    }
    g.innerHTML=h;
}

async function doSearch(){
    const dp = flyDateStr ? flyDateStr : (flyMonth || '');
    const dl = flyDateStr
        ? new Date(flyDateStr+'T00:00:00').toLocaleDateString(L==='uz'?'uz-Latn':'ru-RU',{day:'numeric',month:'long',year:'numeric'})
        : flyMonth
            ? new Date(flyMonth+'-01T00:00:00').toLocaleDateString(L==='uz'?'uz-Latn':'ru-RU',{month:'long',year:'numeric'})
            : (L==='uz'?'eng arzon sana':'лучшая дата');
    
    const dirLabel = flyReverse
        ? (L==='uz'?`${flyDest.flag} ${flyDest.name} → O'rta Osiyo`:`${flyDest.flag} ${flyDest.name} → Ср. Азия`)
        : `${flyDest.flag} ${flyDest.name}`;
    
    $('s'+(flyReverse?9:7)).innerHTML=`<div class="sl" style="text-align:center;padding-top:40px">
        <div style="font-size:48px;animation:pulse 1s ease infinite">🔍</div>
        <h2 class="ttl" style="margin-top:12px">${t().srch}</h2>
        <div style="margin-top:8px;font-size:14px">${dirLabel}</div>
        <div style="margin-top:4px;font-size:12px;color:var(--dim)">📅 ${dl}</div>
        <div style="margin-top:12px;font-size:11px;color:var(--muted)">${flyReverse?'→ TAS • CIT • ALA • FRU • DYU':'🇺🇿 TAS • 🇰🇿 CIT • 🇰🇿 ALA • 🇰🇬 FRU • 🇹🇯 DYU'}</div>
    </div>`;
    hp('medium');
    
    try{
        let url;
        if(flyReverse){
            // Reverse: from foreign city TO central asia airports
            url=API_URL+'/api/search?dest=TAS&origins='+flyDest.iata;
            // Also search to other CA airports
            const caAirports = ['TAS','CIT','ALA','FRU','DYU'];
            const allResults = [];
            for(const ca of caAirports){
                let u=API_URL+'/api/search?dest='+ca+'&origins='+flyDest.iata;
                if(dp) u+='&depart='+dp;
                try{
                    const r=await fetch(u),d=await r.json();
                    if(d.success&&d.results){
                        d.results.forEach(x=>{x.destCity=ca;allResults.push(x)});
                    }
                }catch(e){}
            }
            allResults.sort((a,b)=>a.price-b.price);
            if(!allResults.length){
                $('s9').innerHTML=noFlightsHTML(dl);return;
            }
            showReverseResults(allResults,dl);hp('success');
        } else {
            // Normal: from CA airports TO foreign city
            url=API_URL+'/api/search?dest='+flyDest.iata+'&origins=TAS,CIT,ALA,FRU,DYU';
            if(dp) url+='&depart='+dp;
            const resp=await fetch(url),data=await resp.json();
            
            if(!data.success||!data.results||!data.results.length){
                $('s7').innerHTML=noFlightsHTML(dl);return;
            }
            showResults(data.results,dl);hp('success');
        }
    }catch(e){
        const sn=flyReverse?'s9':'s7';
        $(sn).innerHTML=`<div class="sl" style="text-align:center;padding-top:40px">
            <div style="font-size:48px">⚠️</div><p style="color:var(--red);margin-top:12px">API error</p>
            <button class="bbtn" style="margin-top:16px" onclick="doSearch()">${L==='uz'?"Qayta":"Ещё раз"}</button></div>`;
    }
}

        const d=new Date(curY,curM+i,1);
        const sel=selCalY===d.getFullYear()&&selCalM===d.getMonth();
        h+=`<button class="dbtn${sel?' sel':''}" onclick="r9date(${d.getFullYear()},${d.getMonth()})" style="white-space:nowrap;font-size:11px;padding:8px 14px">${d.toLocaleDateString(L==='uz'?'uz-Latn':'ru-RU',{month:'long'})}</button>`;
    }
    h+=`</div>`;
    
    h+=`<div style="margin:10px 0 8px">
        <button class="nn" onclick="flyDateStr='';flyMonth='${selMonth}';doSearch()" style="width:100%;font-size:14px;padding:14px;border-radius:14px">
            🔥 ${monthName} — ${L==='uz'?'eng arzon kun':'лучшая цена'}
        </button>
    </div>
    <div style="font-size:12px;font-weight:600;color:var(--dim);margin-bottom:8px;text-align:center">${L==='uz'?"Yoki kunni tanlang":"Или выберите день"}</div>`;
    
    h+=`<div id="revCalG"></div>
    <div class="brow" style="margin-top:16px"><button class="bbtn" onclick="r9()">← ${t().bk}</button></div></div>`;
    $('s9').innerHTML=h;
    showRevCal(selCalY,selCalM);
}

function showRevCal(y,m){
    const g=$('revCalG');
    g.innerHTML=`<div style="text-align:center;padding:20px;color:var(--dim);font-size:12px">${L==='uz'?'Narxlar yuklanmoqda...':'Загрузка цен...'}</div>`;
    
    const mo=y+'-'+String(m+1).padStart(2,'0');
    // For reverse: origin is the foreign city, dest is TAS
    fetch(API_URL+'/api/calendar?origin='+flyDest.iata+'&dest=TAS&month='+mo)
    .then(r=>r.json()).then(data=>{
        renderRevCalWithPrices(y,m,data.days||{});
    }).catch(()=>{
        renderRevCalWithPrices(y,m,{});
    });
}

function renderRevCalWithPrices(y,m,dayPrices){
    const g=$('revCalG'),now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    const f=new Date(y,m,1),last=new Date(y,m+1,0),sd=(f.getDay()+6)%7;
    const dn=L==='uz'?['Du','Se','Ch','Pa','Ju','Sh','Ya']:['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
    
    const allPrices=Object.values(dayPrices).map(v=>v.price).filter(p=>p>0);
    const minP=allPrices.length?Math.min(...allPrices):0;
    const maxP=allPrices.length?Math.max(...allPrices):0;
    
    let h=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">`;
    dn.forEach(d=>{h+=`<div style="font-size:10px;color:var(--dim);padding:4px 0;font-weight:600">${d}</div>`});
    for(let i=0;i<sd;i++) h+=`<div></div>`;
    for(let d=1;d<=last.getDate();d++){
        const dt=new Date(y,m,d),ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const past=dt<today;
        const dp=dayPrices[ds];
        const price=dp?dp.price:0;
        const link=dp?dp.link:'';
        
        let priceColor='var(--muted)';
        if(price>0&&minP>0){
            const ratio=(price-minP)/(maxP-minP||1);
            if(ratio<=0.2) priceColor='var(--green)';
            else if(ratio<=0.5) priceColor='var(--acc)';
            else if(ratio<=0.75) priceColor='var(--acc3)';
            else priceColor='var(--dim)';
        }
        
        if(past){
            h+=`<div style="padding:6px 0;opacity:.25"><div style="font-size:12px;color:var(--muted)">${d}</div></div>`;
        } else {
            const clickAction=link?
                `window.open('${link}','_blank')`:
                `flyDateStr='${ds}';flyMonth='';hp('light');doSearch()`;
            h+=`<div onclick="${clickAction}" style="padding:6px 2px;cursor:pointer;border-radius:10px;border:1px solid ${price===minP&&price>0?'var(--green)':'transparent'};background:${price===minP&&price>0?'rgba(52,211,153,.08)':'transparent'}">
                <div style="font-size:13px;font-weight:600;color:var(--text)">${d}</div>
                ${price>0?`<div style="font-size:9px;font-weight:700;color:${priceColor};margin-top:1px">$${price}</div>`:`<div style="font-size:9px;color:var(--muted);margin-top:1px">—</div>`}
            </div>`;
        }
    }
    h+=`</div>`;
    if(minP>0){
        h+=`<div style="margin-top:8px;text-align:center;font-size:11px;color:var(--green);font-weight:600">💚 ${L==='uz'?'Eng arzon':'Мин.'}: $${minP}</div>`;
    }
    g.innerHTML=h;
}

function showReverseResults(results,dl){
    const ap=AIRPORTS[L];
    const best=results[0];
    
    let h=`<div class="sl">
    <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:14px;color:var(--dim)">${flyDest.flag} ${flyDest.name} → ${L==='uz'?"O'rta Osiyo":"Средняя Азия"}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">📅 ${dl} • ${L==='uz'?"Qayerga uchish arzonroq?":"Куда лететь дешевле?"}</div>
    </div>`;
    
    results.forEach((r,i)=>{
        // Find airport info for destination (CA city)
        const destAp=ap.find(x=>x.code===r.destCity)||{name:r.destCity,flag:'✈️'};
        const isBest=i===0,save=r.price-best.price;
        const st=r.stops===0?t().stops0:r.stops===1?t().stops1:(t().stops2||'2+');
        const dd=r.departure?new Date(r.departure).toLocaleDateString(L==='uz'?'uz-Latn':'ru-RU',{day:'numeric',month:'short'}):'';
        
        h+=`<a href="${r.link}" target="_blank" style="text-decoration:none;display:block;margin-bottom:10px">
        <div class="sl sl${Math.min(i+1,5)}" style="background:${isBest?'linear-gradient(135deg,rgba(52,211,153,.08),rgba(99,213,190,.04))':'var(--bg3)'};border:1px solid ${isBest?'rgba(52,211,153,.25)':'var(--brd)'};border-radius:18px;padding:16px;position:relative;overflow:hidden;${isBest?'box-shadow:0 0 30px rgba(52,211,153,.08)':''}">
            ${isBest?'<div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green),var(--acc))"></div>':''}
            <div style="display:flex;align-items:center;gap:12px">
                <div style="font-size:32px">${destAp.flag}</div>
                <div style="flex:1">
                    <div style="font-weight:700;font-size:15px;color:var(--text)">→ ${destAp.name}</div>
                    <div style="font-size:11px;color:var(--dim);margin-top:2px">${flyDest.iata} → ${r.destCity} • ${st}</div>
                    ${dd?`<div style="font-size:10px;color:var(--muted);margin-top:3px">🛫 ${dd}</div>`:''}
                </div>
                <div style="text-align:right">
                    <div style="font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:${isBest?'var(--green)':'var(--text)'}">${fU(r.price)}</div>
                    ${isBest?`<div style="font-size:10px;font-weight:700;color:var(--green);margin-top:2px">🏆 ${L==='uz'?'ENG ARZON':'ЛУЧШАЯ'}</div>`:''}
                    ${!isBest&&save>0?`<div style="font-size:10px;color:var(--red);margin-top:2px">+${fU(save)}</div>`:''}
                </div>
            </div>
            <div style="margin-top:10px;text-align:center;font-size:12px;font-weight:600;color:${isBest?'var(--green)':'var(--acc)'}">${t().buyTicket}</div>
        </div></a>`;
    });
    
    h+=`<div style="text-align:center;font-size:10px;color:var(--muted);margin-bottom:16px">Aviasales • ${L==='uz'?"narx o'zgarishi mumkin":"цена может измениться"}</div>`;
    h+=ctaB();
    h+=`<div style="display:flex;gap:8px;margin-bottom:8px"><button class="bbtn" style="flex:1" onclick="r9date()">📅 ${L==='uz'?"Boshqa sana":"Другая дата"}</button><button class="bbtn" style="flex:1" onclick="r9()">🌍 ${L==='uz'?"Boshqa shahar":"Другой город"}</button></div>
    <div class="brow"><button class="bbtn" onclick="flyReverse=false;go(0)">← ${t().bk}</button></div></div>`;
    $('s9').innerHTML=h;confetti();
}

</script>
