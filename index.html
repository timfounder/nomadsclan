<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Visa Checker — O'zbekiston pasporti</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0f0f14;--card:#1a1a24;--card2:#22222f;--border:#2a2a3a;
--txt:#e8e8f0;--dim:#8888a0;--muted:#55556a;
--green:#22c55e;--greenBg:rgba(34,197,94,.12);--greenBd:rgba(34,197,94,.25);
--yellow:#f59e0b;--yellowBg:rgba(245,158,11,.12);--yellowBd:rgba(245,158,11,.25);
--blue:#3b82f6;--blueBg:rgba(59,130,246,.12);--blueBd:rgba(59,130,246,.25);
--red:#ef4444;--redBg:rgba(239,68,68,.1);--redBd:rgba(239,68,68,.2);
--accent:#818cf8;--accentBg:rgba(129,140,248,.1);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-tap-highlight-color:transparent;padding-bottom:80px}

.header{position:sticky;top:0;z-index:100;background:var(--bg);padding:12px 16px 0;border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.header h1{font-size:18px;font-weight:800;display:flex;align-items:center;gap:6px}
.header h1 span{font-size:20px}
.lang-sw{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.lang-sw button{padding:5px 12px;font-size:12px;font-weight:700;border:none;cursor:pointer;background:var(--card);color:var(--dim);transition:.2s}
.lang-sw button.on{background:var(--accent);color:#fff}

.search-box{position:relative;margin-bottom:10px}
.search-box input{width:100%;padding:10px 14px 10px 38px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--txt);font-size:14px;font-family:inherit;outline:none;transition:.2s}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentBg)}
.search-box input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
.clear-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--border);border:none;color:var(--dim);width:22px;height:22px;border-radius:50%;font-size:13px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}

.filters{display:flex;gap:6px;padding-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fbtn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--dim);font-size:12px;font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap;font-family:inherit}
.fbtn.on{border-color:var(--accent);background:var(--accentBg);color:var(--accent)}
.fbtn .cnt{margin-left:4px;opacity:.6;font-weight:600}

.stats{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none}
.stats::-webkit-scrollbar{display:none}
.stat-pill{flex-shrink:0;padding:6px 12px;border-radius:10px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px}
.stat-free{background:var(--greenBg);color:var(--green);border:1px solid var(--greenBd)}
.stat-arr{background:var(--yellowBg);color:var(--yellow);border:1px solid var(--yellowBd)}
.stat-evisa{background:var(--blueBg);color:var(--blue);border:1px solid var(--blueBd)}
.stat-visa{background:var(--redBg);color:var(--red);border:1px solid var(--redBd)}
.stat-pill .num{font-size:15px;font-weight:800}

.list{padding:8px 16px}
.region-title{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:14px 0 8px;padding-left:4px}
.country-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border-radius:14px;margin-bottom:6px;border:1px solid var(--border);transition:.15s;cursor:pointer;position:relative;overflow:hidden}
.country-card:active{transform:scale(.98);background:var(--card2)}
.country-card .flag{font-size:28px;flex-shrink:0;width:36px;text-align:center}
.country-card .info{flex:1;min-width:0}
.country-card .cname{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.country-card .csub{font-size:11px;color:var(--dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.country-card .badge{flex-shrink:0;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700}
.badge-free{background:var(--greenBg);color:var(--green);border:1px solid var(--greenBd)}
.badge-arr{background:var(--yellowBg);color:var(--yellow);border:1px solid var(--yellowBd)}
.badge-evisa{background:var(--blueBg);color:var(--blue);border:1px solid var(--blueBd)}
.badge-visa{background:var(--redBg);color:var(--red);border:1px solid var(--redBd)}

.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .emoji{font-size:40px;margin-bottom:10px}
.empty .msg{font-size:14px;font-weight:600}

.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.detail-overlay.show{display:flex}
.detail-sheet{width:100%;max-width:480px;max-height:80vh;background:var(--bg);border-radius:20px 20px 0 0;padding:20px 20px 30px;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.detail-sheet .handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 16px}
.detail-sheet .d-flag{font-size:48px;text-align:center}
.detail-sheet .d-name{font-size:20px;font-weight:800;text-align:center;margin-top:6px}
.detail-sheet .d-badge{text-align:center;margin-top:8px}
.detail-sheet .d-badge span{display:inline-block;padding:5px 16px;border-radius:10px;font-size:13px;font-weight:700}
.detail-sheet .d-info{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.d-info-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.d-info-row .d-icon{font-size:18px;flex-shrink:0;width:26px;text-align:center}
.d-info-row .d-label{font-size:11px;color:var(--dim);font-weight:600}
.d-info-row .d-val{font-size:13px;font-weight:700;margin-top:1px}
.d-note{margin-top:12px;padding:12px 14px;background:var(--card);border-radius:12px;border:1px solid var(--border);font-size:12px;color:var(--dim);line-height:1.5}
.d-note b{color:var(--txt)}
</style>
</head>
<body>

<div class="header" id="hdr">
  <div class="header-top">
    <h1><span>🛂</span> <span id="t-title">Visa Checker</span></h1>
    <div class="lang-sw">
      <button class="on" onclick="setLang('uz')">UZ</button>
      <button onclick="setLang('ru')">RU</button>
    </div>
  </div>
  <div class="search-box">

    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
  <div class="filters" id="filters"></div>
</div>

<div class="stats" id="stats"></div>
<div class="list" id="list"></div>

<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">

</div>

const regionOrder=['popular','cis','mideast','asia','europe','africa','americas','caribbean','oceania'];

function t(){return T[L]}

function setLang(l){
  L=l;
  document.querySelectorAll('.lang-sw button').forEach((b,i)=>{
    b.classList.toggle('on',i===(l==='uz'?0:1));
  });
  document.getElementById('t-title').textContent=t().title;
  document.getElementById('searchInput').placeholder=t().search;
  renderFilters();
  render();
}

function renderFilters(){
  const counts={all:0,free:0,arr:0,evisa:0,visa:0};
  COUNTRIES.forEach(c=>{counts.all++;counts[c.type]++});
  const fDiv=document.getElementById('filters');
  const cats=[
    {id:'all',label:t().all,cnt:counts.all},
    {id:'free',label:t().free,cnt:counts.free},
    {id:'arr',label:t().arr,cnt:counts.arr},
    {id:'evisa',label:t().evisa,cnt:counts.evisa},
    {id:'visa',label:t().visa,cnt:counts.visa},
  ];
  fDiv.innerHTML=cats.map(c=>
    `<button class="fbtn${curFilter===c.id?' on':''}" onclick="setFilter('${c.id}')">${c.label}<span class="cnt">${c.cnt}</span></button>`
  ).join('');
}

function setFilter(f){
  curFilter=f;
  renderFilters();
  render();
}

function onSearch(){
  searchQ=document.getElementById('searchInput').value.trim().toLowerCase();
  document.getElementById('clearBtn').style.display=searchQ?'flex':'none';
  render();
}
function clearSearch(){
  document.getElementById('searchInput').value='';
  searchQ='';
  document.getElementById('clearBtn').style.display='none';
  render();
}

function getFiltered(){
  return COUNTRIES.filter(c=>{
    if(curFilter!=='all' && c.type!==curFilter) return false;
    if(searchQ){
      const q=searchQ;
      const nameUz=c.n.uz.toLowerCase();
      const nameRu=c.n.ru.toLowerCase();
      if(!nameUz.includes(q) && !nameRu.includes(q) && !c.f.includes(q)) return false;
    }
    return true;
  });
}

function badgeClass(type){return({free:'badge-free',arr:'badge-arr',evisa:'badge-evisa',visa:'badge-visa'})[type]}
function badgeText(type){return({free:t().freeLabel,arr:t().arrLabel,evisa:t().evisaLabel,visa:t().visaLabel})[type]}
function daysText(d){
  if(d==='1y') return '1 '+t().year;
  if(d==='unlim') return t().unlim;
  return d+' '+t().days;
}

function render(){
  const filtered=getFiltered();

  // Stats
  const st={free:0,arr:0,evisa:0,visa:0};
  filtered.forEach(c=>st[c.type]++);
  document.getElementById('stats').innerHTML=
    `<div class="stat-pill stat-free">✅ <span class="num">${st.free}</span> ${t().freeLabel}</div>`+
    `<div class="stat-pill stat-arr">🛬 <span class="num">${st.arr}</span> ${t().arrLabel}</div>`+
    `<div class="stat-pill stat-evisa">💻 <span class="num">${st.evisa}</span> ${t().evisaLabel}</div>`+
    `<div class="stat-pill stat-visa">📋 <span class="num">${st.visa}</span> ${t().visaLabel}</div>`;

  // Group by region
  const listDiv=document.getElementById('list');
  if(!filtered.length){
    listDiv.innerHTML=`<div class="empty"><div class="emoji">🔍</div><div class="msg">${t().noResult}</div><div style="margin-top:6px;font-size:12px">${t().tryOther}</div></div>`;
    return;
  }

  let html='';
  if(searchQ){
    // Flat list when searching
    filtered.forEach((c,i)=>{
      html+=cardHTML(c,i);
    });
  } else {
    // Grouped by region
    regionOrder.forEach(reg=>{
      const items=filtered.filter(c=>c.region===reg);
      if(!items.length) return;
      html+=`<div class="region-title">${t().regions[reg]||reg} (${items.length})</div>`;
      items.forEach((c,i)=>{html+=cardHTML(c,i)});
    });
  }
  listDiv.innerHTML=html;
}

function cardHTML(c,idx){
  const ci=COUNTRIES.indexOf(c);
  return`<div class="country-card" onclick="openDetail(${ci})">
    <div class="flag">${c.f}</div>
    <div class="info">
      <div class="cname">${c.n[L]}</div>
      <div class="csub">${daysText(c.days)}${c.cost>0?' · $'+c.cost:''}</div>
    </div>
    <div class="badge ${badgeClass(c.type)}">${badgeText(c.type)}</div>
  </div>`;
}

function openDetail(idx){
  const c=COUNTRIES[idx];
  const overlay=document.getElementById('detailOverlay');
  const sheet=document.getElementById('detailSheet');
  const noteText=c.note[L]||(({free:t().free_note,arr:t().arr_note,evisa:t().evisa_note,visa:t().visa_note})[c.type]);

  sheet.innerHTML=`
    <div class="handle"></div>
    <div class="d-flag">${c.f}</div>
    <div class="d-name">${c.n[L]}</div>
    <div class="d-badge"><span class="badge ${badgeClass(c.type)}">${badgeText(c.type)}</span></div>
    <div class="d-info">
      <div class="d-info-row"><div class="d-icon">📅</div><div><div class="d-label">${t().stay}</div><div class="d-val">${daysText(c.days)}</div></div></div>
      <div class="d-info-row"><div class="d-icon">🛂</div><div><div class="d-label">${t().type}</div><div class="d-val">${badgeText(c.type)}</div></div></div>
      <div class="d-info-row"><div class="d-icon">💰</div><div><div class="d-label">${t().cost}</div><div class="d-val">${c.cost>0?'$'+c.cost:(L==='uz'?'Bepul':'Бесплатно')}</div></div></div>
    </div>
    ${noteText?`<div class="d-note">💡 ${noteText}</div>`:''}
  `;
  overlay.classList.add('show');
}

function closeDetail(e){
  if(e.target===document.getElementById('detailOverlay')){
    document.getElementById('detailOverlay').classList.remove('show');
  }
}

// Init
renderFilters();
render();
</script>
