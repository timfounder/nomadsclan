.p{position:absolute;border-radius:50%;animation:pf var(--d) ease-in-out infinite;animation-delay:var(--dl)}
@keyframes pf{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.3)}}

@keyframes bg{from{width:0}}

.slide{animation:su .4s ease forwards}

.wrap{max-width:440px;margin:0 auto;padding:12px 16px 100px;position:relative;z-index:1}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-top:8px}
.logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--a2),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
.sub{font-size:12px;margin:2px 0 0;opacity:.5}
.lbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:6px 14px;color:#a78bfa;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.prog{display:flex;gap:4px;margin-bottom:16px}.prog-d{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.1);transition:.3s}.prog-d.on{background:var(--grad)}
.ttl{font-size:20px;font-weight:700;margin-bottom:4px}.hint{font-size:12px;opacity:.4;margin-bottom:16px}
.card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:14px 12px;cursor:pointer;transition:.2s;color:var(--text);text-align:left;width:100%;font-family:inherit}
.card:active{transform:scale(.96)}.card.sel{background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(0,212,255,.2));border-color:var(--border-a)}
.nav{display:flex;gap:8px;margin-top:20px}
.nb{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:14px;color:#a78bfa;font-weight:600;font-size:15px;cursor:pointer;font-family:inherit}
.nn{flex:2;background:var(--grad);border:none;border-radius:14px;padding:14px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}

.modes{display:flex;flex-direction:column;gap:12px;margin-top:24px}
.mode-card{background:var(--glass2);border:1px solid var(--border);border-radius:18px;padding:20px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:16px}
.mode-card:active{transform:scale(.97)}

.mode-title{font-size:17px;font-weight:700}
.mode-desc{font-size:12px;opacity:.5;margin-top:2px;line-height:1.4}
/* WORK DAYS */
.wd-hero{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(239,68,68,.1));border:1px solid rgba(245,158,11,.25);border-radius:20px;padding:24px;text-align:center;margin-bottom:16px}

.wd-label{font-size:15px;opacity:.6;margin-top:4px}
.salary-input{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.sal-field{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:#fff;font-size:16px;font-family:inherit;font-weight:600;outline:none}

.sal-label{font-size:13px;opacity:.5;white-space:nowrap}

.rev-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.rev-row{display:flex;align-items:center;gap:10px;padding:12px;background:var(--glass);border:1px solid var(--border);border-radius:14px;transition:.2s}

.rev-flag{font-size:24px}.rev-name{flex:1;font-size:14px;font-weight:600}
.rev-info{text-align:right;font-size:12px}

.step{display:none}.step.on{display:block}
</style>

<div><div class="mode-title">${t().mode1t}</div><div class="mode-desc">${t().mode1d}</div></div>
</div>
<div class="mode-card slide sd2" onclick="mode=1;go(5)">
<div class="mode-icon">💼</div>
<div><div class="mode-title">${t().mode2t}</div><div class="mode-desc">${t().mode2d}</div></div>
</div>
<div class="mode-card slide sd3" onclick="mode=2;go(6)">
<div class="mode-icon">💰</div>
<div><div class="mode-title">${t().mode3t}</div><div class="mode-desc">${t().mode3d}</div></div>
</div>
</div>
</div>`;
}

// ===== MODE 0: CALCULATOR =====
function r1(){
let h=`<div class="slide"><h2 class="ttl">${t().selCountry}</h2><p class="hint">${t().flights}</p><div style="display:flex;flex-wrap:wrap;gap:8px">`;
C.forEach((c,i)=>{
const s=country===c.id?' sel':'';
const vi=c.v?'📋 '+t().needVisa:'✅ '+t().noVisa;
const hot=c.p?' • 🔥':'';
h+=`<button class="card sd${i+1} slide${s}" style="width:calc(50% - 4px)" onclick="country='${c.id}';hp('medium');go(2)">
<div style="display:flex;align-items:center;gap:8px"><span style="font-size:28px">${c.f}</span><div><div style="font-weight:700;font-size:14px">${c.n[L]}</div><div style="font-size:11px;opacity:.4">${vi}${hot}</div></div></div>
<div style="font-size:11px;opacity:.3;margin-top:6px">${t().from} ${fU(P[c.id].fl[0])} ✈️</div>
</button>`;
});
h+='</div></div>';$('s1').innerHTML=h;
}

function r2(){
let h=`<div class="slide"><h2 class="ttl">${t().selStyle}</h2><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px">`;
for(let i=0;i<4;i++){
const s=style===i?' sel':'';
const pr=country?`<div style="text-align:right;font-size:13px;font-weight:700;color:var(--a2)">~${fU(P[country].ht[i])}<small style="font-size:10px;opacity:.5">/🌙</small></div>`:'';
h+=`<button class="card slide sd${i+1}${s}" style="display:flex;align-items:center;gap:12px;padding:14px 16px" onclick="style=${i};hp('light');r2()">
<span style="font-size:28px">${SE[i]}</span><div style="flex:1"><div style="font-weight:700;font-size:15px">${t().styles[i]}</div><div style="font-size:11px;opacity:.4">${t().styleD[i]}</div></div>${pr}</button>`;
}
h+=`</div><h3 style="font-size:16px;font-weight:700;margin-bottom:10px">${t().selDur}</h3><div class="dur">`;
[5,7,10,14,21].forEach(d=>{h+=`<button class="dbtn${days===d?' sel':''}" onclick="days=${d};hp('light');r2()">${d} ${t().days}</button>`});
h+=`</div><div class="nav"><button class="nb" onclick="go(1)">← ${t().back}</button><button class="nn" onclick="go(3)">${t().next} →</button></div></div>`;
$('s2').innerHTML=h;
}

function r3(){
let h=`<div class="slide"><h2 class="ttl">${t().selFood}</h2><div class="opts">`;
for(let i=0;i<4;i++){const s=foodS===i?' sel':'';const pr=country?`<div style="font-size:10px;opacity:.4;margin-top:2px">${fU(P[country].fd[i])}/${t().pd}</div>`:'';
h+=`<button class="opt${s}" onclick="foodS=${i};hp('light');r3()"><div style="font-size:24px">${FE[i]}</div><div style="font-size:11px;font-weight:600;margin-top:4px">${t().foods[i]}</div>${pr}</button>`}
h+=`</div><h2 class="ttl">${t().selFun}</h2><div class="opts">`;
for(let i=0;i<4;i++){const s=funS===i?' sel':'';const pr=country?`<div style="font-size:10px;opacity:.4;margin-top:2px">${fU(P[country].fn[i])}/${t().pd}</div>`:'';
h+=`<button class="opt${s}" onclick="funS=${i};hp('light');r3()"><div style="font-size:24px">${UE[i]}</div><div style="font-size:11px;font-weight:600;margin-top:4px">${t().funs[i]}</div>${pr}</button>`}
h+=`</div><div class="nav"><button class="nb" onclick="go(2)">← ${t().back}</button><button class="nn" onclick="go(4)">${t().result} →</button></div></div>`;
$('s3').innerHTML=h;
}

function r4(){
cmpOpen=false;
const r=calc(country,style,days,foodS,funS);if(!r)return;
const c=C.find(x=>x.id===country);
const ys=507*.6,sm=(r.total/ys).toFixed(1),tg2=tag(parseFloat(sm));
const wd=Math.ceil(r.total/(ys/22));
const lbs=[t().fl,t().ht,t().fd,t().fn,t().vi,t().ins],vals=[r.fl,r.ht,r.fd,r.fn,r.vi,r.ins],emos=["✈️","🏨","🍽️","🎡","📋","🛡️"];

let h=`<div class="slide">
<div class="hero"><div style="font-size:14px;opacity:.5;margin-bottom:4px">${c.f} ${c.n[L]} • ${days} ${t().days}</div>
<div class="hero-total">${fU(r.total)}</div>
<div style="font-size:13px;opacity:.4">≈ ${fS(r.total)} so'm</div>
<div style="margin-top:14px;padding:10px 16px;background:rgba(0,0,0,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;gap:8px">
<span style="font-size:20px">${tg2.e}</span><span style="font-weight:700;color:${tg2.c}">${tg2.l}</span>
<span style="opacity:.4;font-size:12px">•</span><span style="font-size:13px;opacity:.6">${sm} ${t().sal}</span>
</div>
<div style="margin-top:10px;padding:8px 16px;background:rgba(245,158,11,.12);border-radius:10px;font-size:14px">
💼 <b>${wd}</b> ${t().workDays} ${L==='uz'?"ishlash kerak":"нужно работать"}
</div>
</div>
<div class="bk-box">`;
vals.forEach((v,i)=>{if(v<=0)return;const pct=(v/r.total*100).toFixed(0);
h+=`<div class="bk-row"><span style="font-size:18px">${emos[i]}</span><span style="flex:1;font-size:13px">${lbs[i]}</span><div class="bk-bar"><div class="bk-fill" style="width:${pct}%;animation-delay:${i*.1}s"></div></div><span style="font-weight:700;font-size:14px;min-width:55px;text-align:right">${fU(v)}</span></div>`});
h+=`</div><div class="sbox"><div style="font-weight:700;font-size:14px;margin-bottom:8px">💰 ${t().saving}</div><div class="sgrid">`;
[10,15,20,30].forEach(p=>{const mo=ys*(p/100),ms=Math.ceil(r.total/mo);
h+=`<div class="sitem"><div style="font-size:11px;opacity:.5">${p}%</div><div style="font-size:18px;font-weight:800;color:var(--green)">${ms}</div><div style="font-size:10px;opacity:.4">${t().mo}</div></div>`});
h+=`</div></div>`;
const tip=TIPS[L][country];
if(tip)h+=`<div class="tip"><div style="font-weight:700;font-size:13px;margin-bottom:4px">💡 ${t().tip}</div><div style="font-size:12px;opacity:.7;line-height:1.5">${tip}</div></div>`;
h+=ctaBlock()+`<div class="brow"><button class="bbtn" onclick="go(0)">🔄 ${t().restart}</button><button class="bbtn" onclick="go(1)">🌍 ${t().other}</button></div></div>`;
$('s4').innerHTML=h;hp('success');
}

// ===== MODE 1: WORK DAYS =====
function r5(){
$('prog').style.display='none';
let h=`<div class="slide">
<h2 class="ttl">${t().workTitle}</h2><p class="hint">${t().workSub}</p>
<div class="salary-input">
<span class="sal-label">${t().workLabel}</span>
<input class="sal-field" type="number" id="salInput" value="${salary}" placeholder="${t().salaryPlaceholder}" oninput="salary=+this.value;updWork()">
</div>
<p style="font-size:11px;opacity:.3;margin-bottom:20px">ℹ️ ${t().workNote}</p>
<div id="workResults"></div>
${ctaBlock()}
<div class="brow"><button class="bbtn" onclick="go(0)">← ${t().back}</button></div>
</div>`;
$('s5').innerHTML=h;
updWork();
}

function updWork(){
const salUSD=salary/12580;
const dailySalary=salUSD/22;
let h='<div class="rev-grid">';
C.forEach(c=>{
const r=calc(c.id,1,7,1,1);
const wd=Math.ceil(r.total/dailySalary);
let cls='rev-ok',badge=t().revOk;
if(wd>66){cls='rev-no';badge=t().revCant}
else if(wd>44){cls='rev-tight';badge=t().revTight}
else if(wd<=22){badge=t().revGreat}
h+=`<div class="rev-row ${cls} slide">
<span class="rev-flag">${c.f}</span>
<span class="rev-name">${c.n[L]}</span>
<div class="rev-info">
<div class="rev-days">${wd} ${L==='uz'?'kun':'дн.'}</div>
<div style="font-size:10px;opacity:.5">${fU(r.total)} • 7 ${t().days}</div>
</div>
</div>`;
});
h+='</div>';
$('workResults').innerHTML=h;
}

// ===== MODE 2: REVERSE =====
function r6(){
$('prog').style.display='none';
let h=`<div class="slide">
<h2 class="ttl">${t().revTitle}</h2><p class="hint">${t().revSub}</p>
<div class="salary-input">
<span class="sal-label">${t().revLabel}</span>
<input class="sal-field" type="number" id="budInput" value="${budget}" placeholder="${t().budgetPlaceholder}" oninput="budget=+this.value;updRev()">
</div>
<p style="font-size:11px;opacity:.3;margin-bottom:20px">ℹ️ ${t().revNote}</p>
<div id="revResults"></div>
${ctaBlock()}
<div class="brow"><button class="bbtn" onclick="go(0)">← ${t().back}</button></div>
</div>`;
$('s6').innerHTML=h;
updRev();
}

function updRev(){
let h='<div class="rev-grid">';
const sorted=C.map(c=>{
const p=P[c.id];
const dailyCost=p.ht[1]+p.fd[1]+p.fn[1]+p.in;
const flightCost=p.fl[1]+p.vi;
const remaining=budget-flightCost;
const maxDays=remaining>0?Math.floor(remaining/dailyCost):0;
return{...c,maxDays,dailyCost,flightCost,total:flightCost+dailyCost*Math.max(maxDays,0)};
}).sort((a,b)=>b.maxDays-a.maxDays);

sorted.forEach(c=>{
let cls,badge;
if(c.maxDays>=10){cls='rev-ok';badge=t().revGreat}
else if(c.maxDays>=5){cls='rev-ok';badge=t().revOk}
else if(c.maxDays>=2){cls='rev-tight';badge=t().revTight}
else{cls='rev-no';badge=t().revCant}
h+=`<div class="rev-row ${cls}">
<span class="rev-flag">${c.f}</span>
<span class="rev-name">${c.n[L]}</span>
<div class="rev-info">
<div class="rev-days">${c.maxDays>0?c.maxDays+' '+t().revDays:badge}</div>
<div style="font-size:10px;opacity:.5">${t().fl}: ${fU(c.flightCost)} + ${fU(c.dailyCost)}/${t().pd}</div>
</div>
</div>`;
});
h+='</div>';
$('revResults').innerHTML=h;
}

go(0);
</script>
